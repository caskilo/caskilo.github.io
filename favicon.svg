<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="18" y1="16" x2="34" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="30" y1="30" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="12" fill="url(#bg)" stroke="#2d333b"/>

  <g filter="url(#softGlow)">
    <circle cx="0" cy="0" r="7.5" fill="url(#leftGlow)">
      <animateMotion dur="12.6s" repeatCount="indefinite" path="M 42 32 a 10 10 0 1 1 -20 0 a 10 10 0 1 1 20 0"/>
      <animate attributeName="r" values="7.5;5.8;7.5" dur="4.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="5.5" fill="url(#rightGlow)">
      <animateMotion dur="12.6s" repeatCount="indefinite" begin="-6s" path="M 42 32 a 10 10 0 1 1 -20 0 a 10 10 0 1 1 20 0"/>
      <animate attributeName="r" values="5.5;9.2;5.5" dur="4.6s" repeatCount="indefinite"/>
    </circle>
  </g>

</svg>
